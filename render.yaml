services:
  # --- Django Web App ---
  - type: web
    name: testpas-web
    env: python
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    preDeployCommand: |
      python manage.py migrate
      python manage.py seed_email_template
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --log-file -
    # startCommand: gunicorn config.wsgi:application --log-file -
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: testpas.settings
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false

  # --- Celery Worker ---
  - type: worker
    name: testpas-celery-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config.celery worker --loglevel=info
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: testpas.settings
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false

  # --- Celery Beat (scheduler, optional) ---
  - type: worker
    name: testpas-celery-beat
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config.celery beat --loglevel=info
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: testpas.settings
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
