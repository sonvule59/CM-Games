stages:
  - build_and_deploy

build_and_deploy:
  stage: build_and_deploy
  tags:
    - ReactRunner
  script:
    - cd Frontend/CM_Intervention
    - npm install --include=dev
    - npm run build
    - pm2 delete cm-app || true
    - pm2 start npm --name cm-app --time -- start 
    - pm2 save
  only:
    - master