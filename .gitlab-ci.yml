stages:
  - build
  - deploy

variables:
  NODE_ENV: production

build:
  stage: build
  tags:
    - ReactRunner
  script:
    - cd Frontend/CM_Intervention
    - npm install
    - ./node_modules/.bin/vite build
  artifacts:
    paths:
      - Frontend/CM_Intervention/dist/
    expire_in: 1 hour

deploy:
  stage: deploy
  tags:
    - ReactRunner
  dependencies:
    - build
  script:
    - cd Frontend/CM_Intervention
    - pm2 delete cm-app || true
    - pm2 serve dist 8080 --spa --name cm-app --time
    - pm2 save
  only:
    - master