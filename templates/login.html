{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Confident Moves Intervention - Login</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            padding: 2rem;
        }
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 2.5rem;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h1 {
            color: #333;
            margin: 0 0 0.5rem 0;
            font-size: 2rem;
            font-weight: 300;
            text-align: center;
        }
        .card p {
            color: #666;
            text-align: center;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-bottom: 1rem;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-link {
            background: transparent;
            color: #667eea;
            text-decoration: underline;
            padding: 0;
            width: auto;
            display: inline;
        }
        .btn-link:hover {
            color: #764ba2;
            transform: none;
            box-shadow: none;
        }
        .links {
            text-align: center;
            margin-top: 1.5rem;
            color: #666;
        }
        .links p {
            margin: 0.5rem 0;
        }
        .alert {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            border-left: 4px solid;
        }
        .alert-error {
            background: #ffebee;
            border-left-color: #f44336;
            color: #c62828;
        }
        .footer {
            text-align: center;
            color: white;
            margin-top: 2rem;
            padding: 1rem;
        }
        .footer p {
            margin: 0.5rem 0;
            opacity: 0.9;
        }
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            .card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Welcome to Confident Moves Intervention</h1>
            <p>Login to Your Account</p>
            
            <!-- {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-error">{{ message }}</div>
                {% endfor %}
            {% endif %} -->
            
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
             
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
            
            <div class="links">
                <p>Don't have an account? <a href="{% url 'create_account' %}" class="btn-link">Create Account</a></p>
                <p>Forgot your password? <a href="{% url 'password_reset' %}" class="btn-link">Reset Password</a></p>
            </div>
            <div class="footer">
                <p>&copy; Confident Moves Intervention. All rights reserved.</p>
            </div>
        </div>
    </div>

    
</body>
</html>
