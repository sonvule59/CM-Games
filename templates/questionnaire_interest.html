
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questionnaire Interest</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body>
    <header>
        <h1>Participation Questionnaire</h1>
    </header>
    
    <main>
        <section id="questionnaire-interest">
            <h2>Are you interested in participating in the eligibility questionnaire?</h2>
            <form id="questionnaire-interest-form" action="" method="POST">
                {% csrf_token %}
                <label>
                    <input type="radio" name="interested" value="yes" required> Yes
                </label><br><br>
                <label>
                    <input type="radio" name="interested" value="no" required> No
                </label><br><br>
                <div id="reason-field" style="display: none; margin-top: 1rem;">
                    <label for="reason">If not interested, please provide a brief reason:</label><br>
                    <textarea name="reason" id="reason" rows="3" cols="50" style="width: 100%; max-width: 500px; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"></textarea>
                </div>
                <br>
                <button type="submit">Submit</button>
            </form>
            <script>
                document.querySelectorAll('input[name="interested"]').forEach(radio => {
                    radio.addEventListener('change', function() {
                        const reasonField = document.getElementById('reason-field');
                        if (this.value === 'no') {
                            reasonField.style.display = 'block';
                            document.getElementById('reason').required = true;
                        } else {
                            reasonField.style.display = 'none';
                            document.getElementById('reason').required = false;
                            document.getElementById('reason').value = '';
                        }
                    });
                });
            </script>
        </section>
    </main>

    <footer>
        <p>&copy;Confident Moves Intervention. All rights reserved.</p>
    </footer>
</body>
</html>
