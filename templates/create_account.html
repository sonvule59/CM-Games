{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Confident Moves Intervention - Create Account</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 2.5rem;
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h1 {
            color: #333;
            margin: 0 0 0.5rem 0;
            font-size: 2rem;
            font-weight: 300;
            text-align: center;
        }
        .card h2 {
            color: #555;
            margin: 2rem 0 1rem 0;
            font-size: 1.3rem;
            font-weight: 500;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 0.5rem;
        }
        .card p {
            color: #666;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-top: 1rem;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-link {
            background: transparent;
            color: #667eea;
            text-decoration: underline;
            padding: 0;
            width: auto;
            display: inline;
        }
        .btn-link:hover {
            color: #764ba2;
            transform: none;
            box-shadow: none;
        }
        .links {
            text-align: center;
            margin-top: 1.5rem;
            color: #666;
        }
        .alert {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            border-left: 4px solid;
        }
        .alert-success {
            background: #e8f5e8;
            border-left-color: #4caf50;
            color: #2e7d32;
        }
        .alert-error {
            background: #ffebee;
            border-left-color: #f44336;
            color: #c62828;
        }
        .alert-info {
            background: #e3f2fd;
            border-left-color: #2196f3;
            color: #0d47a1;
        }
        #create-account-output {
            margin-top: 1.5rem;
        }
        .footer {
            text-align: center;
            color: white;
            margin-top: 2rem;
            padding: 1rem;
        }
        .footer p {
            margin: 0.5rem 0;
            opacity: 0.9;
        }
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            .card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Create Your Account</h1>
            <p>Register to Get Started</p>
            
            <form id="create-account-form" action="{% url 'create_account' %}" method="post" onsubmit="createAccount(event)">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="full_name">Full Name*</label>
                    <input type="text" id="full_name" name="full_name" required placeholder="Enter your full name">
                </div>
                
                <div class="form-group">
                    <label for="username">ID (non-case-sensitive)*</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your ID">
                </div>
                
                <div class="form-group">
                    <label for="password">Password (case-sensitive)*</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                
                <div class="form-group">
                    <label for="password_confirm">Password Confirmation (case-sensitive)*</label>
                    <input type="password" id="password_confirm" name="password_confirm" required placeholder="Confirm your password">
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address (non-case-sensitive)*</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email address">
                </div>
                
                <div class="form-group">
                    <label for="phone_number">Phone Number*</label>
                    <input type="tel" id="phone_number" name="phone_number" required placeholder="Enter your phone number">
                </div>
                
                <div class="form-group">
                    <label for="registration_code">Registration Code*</label>
                    <input type="text" id="registration_code" name="registration_code" required placeholder="Enter registration code">
                </div>
                
                <h2>Address Information</h2>
                
                <div class="form-group">
                    <label for="address_line1">Address Line 1*</label>
                    <input type="text" id="address_line1" name="address_line1" required placeholder="Enter street address">
                </div>
                
                <div class="form-group">
                    <label for="address_line2">Address Line 2 (Optional)</label>
                    <input type="text" id="address_line2" name="address_line2" placeholder="Apartment, suite, etc. (optional)">
                </div>
                
                <div class="form-group">
                    <label for="city">City*</label>
                    <input type="text" id="city" name="city" required placeholder="Enter city">
                </div>
                
                <div class="form-group">
                    <label for="state">State*</label>
                    <input type="text" id="state" name="state" required placeholder="Enter state">
                </div>
                
                <div class="form-group">
                    <label for="zip_code">ZIP Code*</label>
                    <input type="text" id="zip_code" name="zip_code" required placeholder="Enter ZIP code">
                </div>
                
                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>
            
            <div id="create-account-output"></div>
            
            <div class="links">
                <p>Already have an account? <a href="{% url 'login' %}" class="btn-link">Login</a></p>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>&copy; Confident Moves Intervention. All rights reserved.</p>
    </div>

    <script>
        async function createAccount(event) {
            event.preventDefault();
            const form = document.getElementById('create-account-form');
            const outputDiv = document.getElementById('create-account-output');
            outputDiv.innerHTML = '<div class="alert alert-info">Creating your account...</div>';

            try {
                const response = await fetch('/create-account/', {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': getCSRFToken(),
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: new FormData(form)
                });

                const result = await response.json();
                if (response.ok && result.status === 'success') {
                    outputDiv.innerHTML = '<div class="alert alert-success">' + result.message + '</div>';
                    setTimeout(() => { window.location.href = result.redirect; }, 1000);
                } else {
                    let errorHtml = '<div class="alert alert-error">Error: ' + (result.message || 'Account creation failed.') + '</div>';
                    if (result.errors) {
                        let errors = '<ul style="margin: 0.5rem 0; padding-left: 1.5rem;">';
                        for (let field in result.errors) {
                            result.errors[field].forEach(error => {
                                errors += '<li>' + field + ': ' + error + '</li>';
                            });
                        }
                        errors += '</ul>';
                        errorHtml += '<div class="alert alert-error">' + errors + '</div>';
                    }
                    outputDiv.innerHTML = errorHtml;
                }
            } catch (error) {
                outputDiv.innerHTML = '<div class="alert alert-error">An error occurred: ' + error.message + '</div>';
            }
        }

        function getCSRFToken() {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, 'csrftoken'.length + 1) === ('csrftoken' + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring('csrftoken'.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
</body>
</html>
